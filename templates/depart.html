<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 18px; }
    th, td { border: 1px solid #ddd; padding: 6px; }
    th { background: #f6f6f6; text-align: left; }
    .flash { background: #fff7d6; border: 1px solid #f0d36b; padding: 10px; margin: 12px 0; }
    .danger { background: #ffecec; border: 1px solid #ffb8b8; }
  </style>
</head>
<body>
  <h1>部署一覧</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}
        <div class="flash">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

    <form class="row" method="post" action="/depart/add">
    <div>
      <label>部署追加</label><br>
      <label>
        <input name="name" inputmode="text" required>
      </label>
    </div>
    <div>
      <button type="submit">追加</button>
    </div>
  </form>


  <table>
    <thead>
    <tr>
      <th>部署名</th>
      <th>操作</th>
    </tr>
    </thead>
    <tbody>
    {% for id, name in rows %}
      <tr>
        <td>{{ name }}</td>
        <td>
          <form method="post" action="/depart/delete/{{ id }}">
            <button type="submit">削除</button>
          </form>
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>

</body>
</html>
