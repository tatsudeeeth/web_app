<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Info 管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    .row { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 2px; }
    th { background: #f6f6f6; text-align: left; }
    .flash { background: #fff7d6; border: 1px solid #f0d36b; padding: 10px; margin: 12px 0; }
    .danger { background: #ffecec; border: 1px solid #ffb8b8; }
  </style>
</head>
<body>
  <h1>勤怠管理</h1>

  <table>
    <thead>
      <tr>
          <th>日付</th>
          <th>時間種別</th>
          <th>開始日時</th>
          <th>終了日時</th>
      </tr>
    </thead>
    <tbody>
      {% for cal_date, items in grouped.items() %}
        {% for item in items %}
          <tr>
              {% if loop.first %}
                  <td rowspan="{{ items|length }}">{{ cal_date }}</td>
              {% endif %}
              <td>{{ item.record_type or "" }}</td>
              <td>{{ item.begin or "" }}</td>
              <td>{{ item.end or "" }}</td>
          </tr>
        {% endfor %}
      {% endfor %}
    </tbody>
  </table>

</body>
</html>
