<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Info 管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 18px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f6f6f6; text-align: left; }
    .flash { background: #fff7d6; border: 1px solid #f0d36b; padding: 10px; margin: 12px 0; }
    .danger { background: #ffecec; border: 1px solid #ffb8b8; }
  </style>
</head>
<body>
  <h1>Info 管理</h1>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}
        <div class="flash">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form class="row" method="post" action="/info/add">
    <div>
      <label>information</label><br>
      <label>
        <input name="information" inputmode="text" placeholder="例: 新規連絡" required>
      </label>
    </div>
    <div>
      <button type="submit">追加</button>
    </div>
  </form>

  <table>
    <thead>
      <tr>
        <th>updated_day</th>
        <th>information</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for id, updated_day, information in rows %}
      <tr>
        <td>{{ updated_day }}</td>
        <td>{{ information }}</td>
        <td>
          <form method="post" action="/info/delete/{{ id }}" onsubmit="return confirm('削除します。よろしいですか？')">
            <button type="submit" class="danger">削除</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</body>
</html>
