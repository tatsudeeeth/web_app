<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 8px 12px; font-size: 14px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 18px; }
    th, td { border: 1px solid #ddd; padding: 6px; }
    th { background: #f6f6f6; text-align: left; }
    .flash { background: #fff7d6; border: 1px solid #f0d36b; padding: 10px; margin: 12px 0; }
    .danger { background: #ffecec; border: 1px solid #ffb8b8; }
  </style>
</head>
<body>
  <h1>table test</h1>

    <label for="colCount">列数</label>
    <select id="colCount">
        <option value="1">1列</option>
        <option value="2">2列</option>
        <option value="3">3列</option>
        <option value="4">4列</option>
    </select>

    <table id="dynamicTable">
        <thead>
            <tr id="headerRow"></tr>
        </thead>
        <tbody>
            <tr id="dataRow"></tr>
        </tbody>
    </table>

    <script>
    function renderTable(colCount) {
        const headerRow = document.getElementById("headerRow");
        const dataRow = document.getElementById("dataRow");

        headerRow.innerHTML = "";
        dataRow.innerHTML = "";

        for (let i = 1; i <= colCount; i++) {
            const th = document.createElement("th");
            th.textContent = `項目${i}`;
            headerRow.appendChild(th);

            const td = document.createElement("td");
            td.innerHTML = `<input type="text" name="item_${i}" />`;
            dataRow.appendChild(td);
        }
    }

    document.getElementById("colCount").addEventListener("change", function() {
        renderTable(Number(this.value));
    });

    renderTable(1);
    </script>

</body>
</html>
